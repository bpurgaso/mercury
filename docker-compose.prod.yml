# ─────────────────────────────────────────────────────────────────────────────
# Mercury — Production Deployment
# ─────────────────────────────────────────────────────────────────────────────
#
# Includes the Mercury server container alongside infrastructure services.
#
# Usage:
#   cp .env.example .env          # Configure production values
#   docker compose -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Mercury Server ───────────────────────────────────────────────────────
  mercury:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${MERCURY_SERVER_PORT:-8443}:8443"
      - "${METRICS_BIND_PORT:-9090}:9090"
    environment:
      MERCURY_SERVER_HOST: "0.0.0.0"
      MERCURY_SERVER_PORT: "8443"
      MERCURY_DATABASE_URL: "postgres://${POSTGRES_USER:-mercury}:${POSTGRES_PASSWORD:-mercury}@postgres:5432/${POSTGRES_DB:-mercury}"
      MERCURY_REDIS_URL: "redis://redis:6379"
      MERCURY_AUTH_JWT_SECRET: "${MERCURY_AUTH_JWT_SECRET:-change-me-in-production}"
      MERCURY_TLS_CERT_PATH: "/certs/cert.pem"
      MERCURY_TLS_KEY_PATH: "/certs/key.pem"
      TURN_SECRET: "${TURN_SECRET:-change-me-in-production}"
      MERCURY_LOG_LEVEL: "${MERCURY_LOG_LEVEL:-mercury=info,mercury_media=warn}"
      CORS_ORIGINS: "${CORS_ORIGINS:-}"
    volumes:
      - ./certs:/certs:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8443/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    networks:
      - mercury_network

  # ── Postgres ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mercury}
      POSTGRES_USER: ${POSTGRES_USER:-mercury}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mercury}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mercury}"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
    restart: unless-stopped
    networks:
      - mercury_network

  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    restart: unless-stopped
    networks:
      - mercury_network

  # ── coturn (TURN/STUN relay for WebRTC) ──────────────────────────────────
  coturn:
    image: coturn/coturn:latest
    network_mode: host
    volumes:
      - ./certs:/etc/coturn/certs:ro
    environment:
      - TURN_SECRET=${TURN_SECRET:-mercury-turn-dev-secret}
    command: >
      -n
      --log-file=stdout
      --listening-port=3478
      --tls-listening-port=5349
      --min-port=49152
      --max-port=49252
      --use-auth-secret
      --static-auth-secret=$${TURN_SECRET}
      --realm=${PUBLIC_DOMAIN:-localhost}
      --cert=/etc/coturn/certs/cert.pem
      --pkey=/etc/coturn/certs/key.pem
      --no-cli
      --no-multicast-peers
      --fingerprint
    restart: unless-stopped

networks:
  mercury_network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
