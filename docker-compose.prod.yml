# ─────────────────────────────────────────────────────────────────────────────
# Mercury — Production Deployment
# ─────────────────────────────────────────────────────────────────────────────
#
# Includes the Mercury server container alongside infrastructure services.
#
# Usage:
#   cp .env.prod.example .env.prod    # Configure production values
#   docker compose -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Mercury Server ───────────────────────────────────────────────────────
  mercury:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env.prod
    ports:
      - "8443:8443"
      - "10000-10100:10000-10100/udp"
    volumes:
      - certs:/certs:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      coturn:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-sfk", "https://localhost:8443/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    networks:
      - mercury_network

  # ── Postgres ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    env_file: .env.prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mercury"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
    restart: unless-stopped
    networks:
      - mercury_network

  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    restart: unless-stopped
    networks:
      - mercury_network

  # ── coturn (TURN/STUN relay for WebRTC) ──────────────────────────────────
  coturn:
    image: coturn/coturn:latest
    network_mode: host
    env_file: .env.prod
    volumes:
      - certs:/etc/coturn/certs:ro
    command: >
      -n
      --log-file=stdout
      --listening-port=3478
      --tls-listening-port=5349
      --min-port=49152
      --max-port=49252
      --use-auth-secret
      --static-auth-secret=${TURN_SECRET}
      --realm=${PUBLIC_DOMAIN}
      --cert=/etc/coturn/certs/cert.pem
      --pkey=/etc/coturn/certs/key.pem
      --no-cli
      --no-multicast-peers
      --fingerprint
    healthcheck:
      test: ["CMD-SHELL", "echo | nc -u -w1 127.0.0.1 3478 && exit 0 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

networks:
  mercury_network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  certs:
