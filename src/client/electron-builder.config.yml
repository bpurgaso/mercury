appId: com.mercury.app
productName: Mercury
directories:
  output: dist
  buildResources: resources

files:
  - out/**/*
  - package.json

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  category: public.app-category.social-networking
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

win:
  target:
    - target: nsis
      arch: [x64, arm64]
    - target: portable
  sign: true

linux:
  target:
    - target: AppImage
      arch: [x64, arm64]
    - target: deb
    - target: rpm
    - target: flatpak
  category: Network

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

publish:
  provider: generic
  url: "https://updates.your-server.com"
