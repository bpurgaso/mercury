[server]
host = "0.0.0.0"
port = 8443
auth_rate_limit_per_min = 100

[database]
url = "postgres://mercury:mercury@localhost:5432/mercury"

[redis]
url = "redis://localhost:6379"

[auth]
jwt_secret = "dev-secret-change-in-production"
jwt_expiry_minutes = 60
refresh_token_expiry_days = 30
argon2_memory_kib = 65536
argon2_iterations = 3
argon2_parallelism = 4

[tls]
cert_path = "./certs/cert.pem"
key_path = "./certs/key.pem"

[turn]
enabled = false
secret = ""
urls = []
credential_ttl_seconds = 86400

[media]
dedicated_cores = 2
max_participants_per_room = 25
empty_room_timeout_secs = 300
udp_port_range_start = 10000
udp_port_range_end = 10100

[media.ice]
turn_secret = ""
turn_urls = []
stun_urls = []

[media.audio]
max_bitrate_kbps = 128
preferred_bitrate_kbps = 64

[media.video]
max_bitrate_kbps = 2500
max_resolution = "1280x720"
max_framerate = 30

[media.bandwidth]
total_mbps = 100
per_user_kbps = 4000

[observability]
# metrics_bind = "0.0.0.0:9090"  # Optional separate metrics endpoint
